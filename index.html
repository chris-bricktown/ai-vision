<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강아지·고양이 식별기</title>
  <meta name="description" content="웹캠으로 강아지와 고양이를 인식하는 프로그램" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>강아지·고양이 식별기</h1>
  </header>

  <main>
    <div class="controls">
      <button id="start-btn" type="button">웹캠 시작</button>
      <button id="stop-btn" type="button" disabled>중지</button>
      <select id="camera-select" class="camera-select" hidden aria-label="카메라 선택"></select>
      <div class="zoom-control" id="zoom-control" hidden>
        <label for="zoom-range">줌</label>
        <input type="range" id="zoom-range" min="1" max="1" step="0.1" value="1" />
        <span id="zoom-value">1.0x</span>
      </div>
      <span id="status" class="status" role="status">모델 로딩 대기 중</span>
    </div>

    <div class="stage" id="stage">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <p id="placeholder" class="placeholder">
        "웹캠 시작" 버튼을 눌러 카메라 접근을 허용하면<br />실시간 객체 인식이 시작됩니다.
      </p>
    </div>

    <div class="info-panel">
      <div class="fps-counter">FPS: <span id="fps">0</span></div>
      <ul id="detections" class="detections"></ul>
    </div>

    <div class="result-panel" id="result-panel" hidden>
      <h2 id="result-title"></h2>
      <img id="result-image" class="result-image" alt="" />
      <p id="result-caption" class="result-caption"></p>
      <button id="rescan-btn" type="button">다시 인식하기</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  <script src="breedClassifier.js"></script>
  <script src="labels_ko.js"></script>
  <script src="app.js"></script>
</body>
</html>
